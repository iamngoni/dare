name: "Parallel Showcase"
description: "Show multiple agents running in parallel across waves"

tasks:
  - id: spec_notes
    description: "Create /tmp/dare-show/spec.md with a short API spec summary"
    depends_on: []
    outputs: [/tmp/dare-show/spec.md]

  - id: schema_notes
    description: "Create /tmp/dare-show/schema.sql with a simple SQL table definition"
    depends_on: []
    outputs: [/tmp/dare-show/schema.sql]

  - id: model_notes
    description: "Create /tmp/dare-show/models.md describing a Todo model"
    depends_on: []
    outputs: [/tmp/dare-show/models.md]

  - id: test_plan
    description: "Create /tmp/dare-show/test-plan.md with 5 API test cases"
    depends_on: []
    outputs: [/tmp/dare-show/test-plan.md]

  - id: integrate_api
    description: "Create /tmp/dare-show/api.md combining spec and model notes"
    depends_on: [spec_notes, model_notes]
    outputs: [/tmp/dare-show/api.md]

  - id: integrate_db
    description: "Create /tmp/dare-show/db.md combining schema and test plan notes"
    depends_on: [schema_notes, test_plan]
    outputs: [/tmp/dare-show/db.md]

  - id: final_summary
    description: "Create /tmp/dare-show/summary.md that summarizes all previous outputs"
    depends_on: [integrate_api, integrate_db]
    outputs: [/tmp/dare-show/summary.md]
